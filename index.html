<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeX</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  overflow-x: hidden;
  color: white;
  text-align: center;
}

/* PARTÍCULAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* LOGO */
.logo img {
  width: 180px;
  margin-top: 40px;
}

/* TEXTO */
.subtitle {
  color: #94a3b8;
  margin: 10px;
}

/* BOTÕES */
.container {
  padding: 20px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 15px auto;
  width: 90%;
  max-width: 400px;
  padding: 16px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  background: linear-gradient(90deg, #0ea5e9, #2563eb);
  box-shadow: 0 0 10px #0ea5e9, 0 0 30px rgba(0,229,255,0.6);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px #0ea5e9, 0 0 60px rgba(0,229,255,0.9);
}

/* WHATSAPP */
.whatsapp {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  box-shadow: 0 0 10px #22c55e, 0 0 30px rgba(34,197,94,0.6);
}

/* FOOTER */
.footer {
  margin-top: 30px;
  padding: 20px;
  color: #64748b;
  font-size: 12px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- LOGO -->
<div class="logo">
  <img src="Imagens/ChatGPT Image 22 de mar. de 2026, 12_04_53.png" alt="PrimeX">
</div>

<p class="subtitle">Soluções de alto performance</p>

<div class="container">

  <a class="btn" href="#">📄 Solicitar Orçamento</a>
  <a class="btn" href="#">📁 Nosso Portfólio</a>
  <a class="btn" href="#">⚙️ Serviços</a>

  <a class="btn whatsapp" href="https://wa.me/5583986948551" target="_blank">
    💬 Fale Conosco
  </a>

  <a class="btn" href="#">📸 Instagram</a>

</div>

<div class="footer">
  © 2026 PrimeX
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    dx: (Math.random() - 0.5) * 0.5,
    dy: (Math.random() - 0.5) * 0.5
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "#0ea5e9";
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
